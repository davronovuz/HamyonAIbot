services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hamyonai}
      POSTGRES_USER: ${POSTGRES_USER:-hamyon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hamyon} -d ${POSTGRES_DB:-hamyonai}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hamyon_net

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      # Mavjud reverse proxy variant uchun — localhost:8080
      # Agar faqat nginx (8443) ishlatsa, "ports" ni "expose" ga almashtiring
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hamyon_net

  # Nginx reverse proxy — HTTPS (port 8443)
  # 80 va 443 band bo'lgani uchun 8443 ishlatiladi
  nginx:
    build: ./nginx
    restart: unless-stopped
    ports:
      - "8443:443"
    volumes:
      # Production uchun: real SSL sertifikatlarni mount qiling
      # - /path/to/your/cert.pem:/etc/nginx/ssl/cert.pem:ro
      # - /path/to/your/key.pem:/etc/nginx/ssl/key.pem:ro
      - ssl_certs:/etc/nginx/ssl
    depends_on:
      - bot
    networks:
      - hamyon_net

  # pgAdmin — faqat development uchun
  # Ishlatish: docker compose --profile dev up
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    profiles: ["dev"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@hamyon.ai}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hamyon_net

volumes:
  pgdata:
    driver: local
  ssl_certs:
    driver: local

networks:
  hamyon_net:
    driver: bridge
