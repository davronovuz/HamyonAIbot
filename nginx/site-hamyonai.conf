# ═══════════════════════════════════════════════
# Mavjud nginx reverse proxy ga qo'shish uchun
# ═══════════════════════════════════════════════
#
# Agar serverda allaqachon nginx 80/443 da ishlayotgan bo'lsa:
# 1. Bu faylni /etc/nginx/sites-available/hamyonai ga ko'chiring
# 2. Symlink yarating: ln -s /etc/nginx/sites-available/hamyonai /etc/nginx/sites-enabled/
# 3. DNS da subdomain yarating: hamyon.yourdomain.com → server IP
# 4. Let's Encrypt: certbot --nginx -d hamyon.yourdomain.com
# 5. nginx -t && systemctl reload nginx
# 6. .env da: WEBAPP_URL=https://hamyon.yourdomain.com

server {
    listen 80;
    server_name hamyon.yourdomain.com;  # <-- O'zgartiring

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name hamyon.yourdomain.com;  # <-- O'zgartiring

    # Let's Encrypt sertifikat (certbot avtomatik yozadi)
    # ssl_certificate /etc/letsencrypt/live/hamyon.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/hamyon.yourdomain.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (agar kerak bo'lsa)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
